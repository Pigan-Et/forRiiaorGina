<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你愿意和我约会吗？👉👈</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --primary-color: #ff4d6d;
            --primary-hover: #ff758f;
            --bg-gradient-1: #ffe5ec;
            --bg-gradient-2: #ffcad4;
            --text-color: #4a4a4a;
            --card-bg: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2.5rem 2rem;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
            position: relative;
        }

        /* 步骤面板核心切换样式 */
        .step-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.5rem;
            width: 100%;
        }

        .step-panel.active {
            display: flex;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.6rem;
            color: #ff143b;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            word-break: break-all;
        }

        p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }

        .gif-container {
            width: 100%;
            max-width: 180px;
            height: 180px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        /* 按钮通用样式 */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
            margin-top: 1rem;
        }

        button {
            border: none;
            outline: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .btn-yes {
            background: var(--primary-color);
            color: white;
            padding: 0.8rem 2.2rem;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.3);
            flex: 1;
            max-width: 160px;
        }

        .btn-yes:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4);
        }

        .btn-no {
            background: #a2a2a2;
            color: white;
            padding: 0.8rem 2.2rem;
            border-radius: 50px;
            flex: 1;
            max-width: 160px;
            z-index: 9999; /* 确保乱飞时不被其他元素遮挡 */
        }

        .btn-back {
            background: transparent;
            color: #999;
            border: 1px solid #ddd;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .btn-back:hover {
            background: rgba(0,0,0,0.03);
            color: #666;
        }

        /* 表单输入框区域 */
        .input-group {
            width: 100%;
            text-align: left;
            margin-top: 0.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #888;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        .styled-input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #ffe5ec;
            border-radius: 16px;
            font-size: 1rem;
            color: var(--text-color);
            background: white;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .styled-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.1);
        }

        /* 标签多选网格结构 */
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            width: 100%;
            margin: 0.5rem 0;
        }

        .btn-choice {
            background: white;
            border: 2px solid #ffe5ec;
            padding: 0.8rem 1rem;
            border-radius: 18px;
            color: var(--text-color);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-choice:hover {
            background: #fff0f3;
            border-color: #ffcad4;
        }

        .btn-choice.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.25);
        }

        textarea.styled-input {
            resize: none;
            height: 90px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <form action="https://api.web3forms.com/submit" method="POST" id="quizForm" onsubmit="return prepareSubmission()">
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
            <input type="hidden" name="subject" value="💖 哇！你收到了一份完美的约会答卷！">
            <input type="hidden" name="from_name" value="约会邀请小助手">
            
            <input type="hidden" name="选择的日期" id="hiddenDate">
            <input type="hidden" name="选择的时间" id="hiddenTime">
            <input type="hidden" name="想吃的美食" id="hiddenFood">
            <input type="hidden" name="想玩的活动" id="hiddenActivities">

            <div id="step-1" class="step-panel active">
                <div class="gif-container">
                    <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW9scXF6Y290cmZ6bnRpaWh5NXp3MXFpZnd6bms3YW92Y2Rnd29pbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/c4r6mUCOphS6f8pSlK/giphy.gif" alt="Bubu Dudu">
                </div>
                <h1>这周末，你愿意和我一起去约会吗？ 👉👈</h1>
                <p>偷偷告诉你，这门考试不允许挂科，请谨慎选择~</p>
                <div class="btn-container">
                    <button type="button" class="btn-yes" id="yesBtn" onclick="nextStep(1, 2)">愿意！</button>
                    <button type="button" class="btn-no" id="noBtn" onmouseover="dodge()" onclick="dodge()" ontouchstart="dodge()">不愿意</button>
                </div>
            </div>

            <div id="step-2" class="step-panel">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTFwY2g0Z3lsM295dHFlZms1cWZ2eWp3ZndndXp2N3Z5b3B6dzFwMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/mS80vV9IdbE9LAn26Z/giphy.gif" alt="Pick date">
                </div>
                <h1>太棒了！哪天最完美？ 📅</h1>
                
                <div class="input-group">
                    <label>选择心动日期</label>
                    <input type="text" id="dateInput" class="styled-input" placeholder="点击挑选日期 🌸" readonly>
                </div>

                <div class="input-group">
                    <label>选择最佳时间</label>
                    <input type="text" id="timeInput" class="styled-input" placeholder="点击选择时间 ⏰" readonly>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn-back" onclick="nextStep(2, 1)">返回</button>
                    <button type="button" class="btn-yes" onclick="nextStep(2, 3)">下一步</button>
                </div>
            </div>

            <div id="step-3" class="step-panel">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWRuM3p5M3AwZ3g4dHhkamg0MTNma295N3p3czY5ZXp0czUzdmNpayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/Y8SdfGbygRkd8wz47F/giphy.gif" alt="Food">
                </div>
                <h1>肚子饿了！想吃点什么呢？ 🍕</h1>
                <p>（支持多选哦，只要你喜欢我都带你去）</p>
                
                <div class="choices-grid">
                    <button type="button" class="btn-choice" onclick="toggleFood(this, '浪漫西餐 🥩')">浪漫西餐 🥩</button>
                    <button type="button" class="btn-choice" onclick="toggleFood(this, '热辣火锅 🍲')">热辣火锅 🍲</button>
                    <button type="button" class="btn-choice" onclick="toggleFood(this, '精致日料 🍣')">精致日料 🍣</button>
                    <button type="button" class="btn-choice" onclick="toggleFood(this, '甜品奶茶 🍰')">甜品奶茶 🍰</button>
                    <button type="button" class="btn-choice" onclick="toggleFood(this, '路边小吃 🍢')">路边小吃 🍢</button>
                    <button type="button" class="btn-choice" onclick="toggleFood(this, '由我盲盒决定 🎁')">秘密盲盒 🎁</button>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn-back" onclick="nextStep(3, 2)">返回</button>
                    <button type="button" class="btn-yes" onclick="nextStep(3, 4)">下一步</button>
                </div>
            </div>

            <div id="step-4" class="step-panel">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdWZ2ajhoN3A0eXU2cDZ0Njd6NXh0ZHFpNXo5NWZ4dWhtZGs3bzFsbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/VwVp6u89mX9vH5Wp5z/giphy.gif" alt="Activity">
                </div>
                <h1>接下来的节目是什么？ 🎬</h1>
                <p>（同样可以多选，把一天安排得满满当当）</p>
                
                <div class="choices-grid">
                    <button type="button" class="btn-choice" onclick="toggleActivity(this, '看场电影 🍿')">看场电影 🍿</button>
                    <button type="button" class="btn-choice" onclick="toggleActivity(this, '散步聊天 🗺️')">散步聊天 🗺️</button>
                    <button type="button" class="btn-choice" onclick="toggleActivity(this, '游乐园 🎡')">游乐园 🎡</button>
                    <button type="button" class="btn-choice" onclick="toggleActivity(this, '逛街抓娃娃 🧸')">逛街抓娃娃 🧸</button>
                    <button type="button" class="btn-choice" onclick="toggleActivity(this, '去拍照打卡 📷')">拍照打卡 📷</button>
                    <button type="button" class="btn-choice" onclick="toggleActivity(this, '等见到了再说 🤫')">到时候再说 🤫</button>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn-back" onclick="nextStep(4, 3)">返回</button>
                    <button type="button" class="btn-yes" onclick="nextStep(4, 5)">下一步</button>
                </div>
            </div>

            <div id="step-5" class="step-panel">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW51bTZoYms1Y2NxNms5eHloMWNsbG55cWkycmM3Ymd1N3phdW00MCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/L33yUI7HcoZitA3N2C/giphy.gif" alt="Love">
                </div>
                <h1>最后一项啦！💌</h1>
                <p>有什么想对我说的话，或者额外的期待吗？</p>
                
                <div class="input-group">
                    <textarea name="留言备忘录" class="styled-input" placeholder="例如：我想喝那家新开的奶茶！或者写下你的心情... (选填)"></textarea>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn-back" onclick="nextStep(5, 4)">返回</button>
                    <button type="submit" class="btn-yes" style="background: #ff143b;">发送给 TA ✨</button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <script>
        // ==========================================
        // 核心 JavaScript 逻辑 —— 全部完全置于全局作用域
        // ==========================================
        
        let selectedFood = [];
        let selectedActivities = [];

        // 1. 绝对安全的面板切换逻辑
        function nextStep(current, next) {
            // 第二步的前进验证
            if (current === 2 && next > current) {
                const dateVal = document.getElementById('dateInput').value;
                const timeVal = document.getElementById('timeInput').value;
                if (!dateVal || !timeVal) {
                    alert("请先选好心动的日期和时间哦！❤️");
                    return;
                }
            }
            // 第三步的前进验证
            if (current === 3 && next > current) {
                if (selectedFood.length === 0) {
                    alert("多少选一个嘛，不挑食的孩子有糖吃！🍕");
                    return;
                }
            }
            // 第四步的前进验证
            if (current === 4 && next > current) {
                if (selectedActivities.length === 0) {
                    alert("选一个想玩的嘛，你想去哪我都陪你！✨");
                    return;
                }
            }

            // 顺利切面板
            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${next}`).classList.add('active');
        }

        // 2. 无懈可击的视口级全屏飞跃算法（彻底根治 No 按钮不动的Bug）
        function dodge() {
            const noBtn = document.getElementById('noBtn');
            
            // 瞬间切换到屏幕 fixed 定位，彻底打破原容器边界束缚
            if (noBtn.style.position !== 'fixed') {
                noBtn.style.position = 'fixed';
            }
            
            // 安全预留内边距，防止按钮飞出屏幕外面看不到
            const padding = 25;
            const btnWidth = noBtn.offsetWidth || 140;
            const btnHeight = noBtn.offsetHeight || 45;

            // 全视口大小动态追踪计算
            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            // 在安全区间内，生成全屏幕的绝对随机落点
            const randomX = Math.max(padding, Math.random() * maxX);
            const randomY = Math.max(padding, Math.random() * maxY);

            // 强制渲染位置
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // 3. 食物多选标签处理
        function toggleFood(element, value) {
            element.classList.toggle('selected');
            if (selectedFood.includes(value)) {
                selectedFood = selectedFood.filter(item => item !== value);
            } else {
                selectedFood.push(value);
            }
        }

        // 4. 活动多选标签处理
        function toggleActivity(element, value) {
            element.classList.toggle('selected');
            if (selectedActivities.includes(value)) {
                selectedActivities = selectedActivities.filter(item => item !== value);
            } else {
                selectedActivities.push(value);
            }
        }

        // 5. 提交前将数组组装打包进隐蔽字段
        function prepareSubmission() {
            document.getElementById('hiddenDate').value = document.getElementById('dateInput').value;
            document.getElementById('hiddenTime').value = document.getElementById('timeInput').value;
            document.getElementById('hiddenFood').value = selectedFood.join(', ');
            document.getElementById('hiddenActivities').value = selectedActivities.join(', ');
            return true; 
        }

        // 6. 第三方时间插件初始化（页面加载时自动执行）
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr("#dateInput", {
                locale: "zh",
                dateFormat: "Y年m月d日 (l)",
                minDate: "today",
                disableMobile: "true"
            });

            flatpickr("#timeInput", {
                locale: "zh",
                enableTime: true,
                noCalendar: true,
                dateFormat: "H:i",
                time_24hr: true,
                disableMobile: "true"
            });
        });
    </script>
</body>
</html>
