<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question for you... 👉👈</title>
    <style>
        /* Base Romantic Styles */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffeaa7 0%, #ffb8b8 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Floating Hearts Background */
        .heart {
            position: absolute;
            color: rgba(255, 107, 107, 0.4);
            font-size: 20px;
            animation: float 4s linear infinite;
            z-index: 1;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 85%;
            z-index: 10;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        .gif-container img {
            width: 160px;
            height: 160px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 20px;
        }

        p {
            color: #636e72;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* Form & Grid Styles */
        .step-panel { display: none; }
        .step-panel.active { display: block; }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        /* Interactive Cards */
        .option-card {
            background: white;
            border: 2px solid #ffeaa7;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #2d3436;
        }
        .option-card .icon { font-size: 30px; }
        .option-card:hover { transform: translateY(-3px); border-color: #ff7675; }
        
        /* Hidden Checkboxes but styled cards */
        .option-card input[type="checkbox"] {
            display: none;
        }
        .option-card.selected {
            background-color: #ff7675;
            color: white;
            border-color: #d63031;
        }
