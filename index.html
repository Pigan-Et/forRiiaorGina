<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question for you... 👉👈</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Creamy Pastel Pop Aesthetic */
        :root {
            --bg-gradient: linear-gradient(135deg, #fff5eb 0%, #ffe3e8 100%);
            --panel-bg: #fffdf9;
            --primary-pink: #ff8b94;
            --hover-pink: #ff6b7b;
            --border-color: #ffccd5;
            --shadow-color: #ffb3ba;
            --text-dark: #4a4a4a;
            --text-muted: #888888;
            --btn-gray: #e0e0e0;
            --btn-gray-shadow: #c5c5c5;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Sweet Floating Background Elements */
        .heart-pop {
            position: absolute;
            color: rgba(255, 139, 148, 0.35);
            font-size: 24px;
            animation: floatUp 4.5s linear infinite;
            z-index: 1;
            user-select: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* Big App-Style Container occupying 80% screen beautifully */
        .container {
            width: 90%;
            max-width: 680px;
            height: 85vh;
            max-height: 750px;
            min-height: 540px;
            background: var(--panel-bg);
            border: 5px solid var(--border-color);
            border-radius: 40px;
            box-shadow: 0 16px 0 var(--shadow-color);
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        form {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Smooth Screen Slide/Fade Animation */
        .step-panel {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .step-panel.active {
            display: flex;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Content Elements */
        .gif-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            max-height: 240px;
            margin-bottom: 15px;
        }
        .gif-container img {
            max-height: 100%;
            max-width: 220px;
            border-radius: 25px;
            object-fit: contain;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            color: #ff5e7e;
            font-size: 28px;
            margin: 10px 0;
            line-height: 1.3;
        }
        @media(max-height: 600px) { h1 { font-size: 22px; } }

        p {
            color: var(--text-dark);
            font-size: 17px;
            font-weight: 700;
            margin: 0 0 20px 0;
        }

        /* Chunky Neo-Pop Input fields */
        input[type="date"], input[type="time"], input[type="text"] {
            width: 85%;
            max-width: 320px;
            padding: 15px;
            border: 3px solid var(--border-color);
            border-radius: 20px;
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            color: var(--text-dark);
            text-align: center;
            outline: none;
            background: #fff;
            box-shadow: 0 6px 0 var(--shadow-color);
            transition: all 0.1s ease;
            margin-bottom: 25px;
        }
        input:focus {
            transform: translateY(2px);
            box-shadow: 0 4px 0 var(--shadow-color);
            border-color: var(--primary-pink);
        }

        /* Grid Selection Layout as seen in Reference Images */
        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            flex: 1;
            align-content: center;
        }

        /* 3D Jelly Option Cards */
        .option-card {
            background: #fff;
            border: 3px solid var(--border-color);
            border-radius: 22px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 700;
            color: var(--text-dark);
            box-shadow: 0 6px 0 var(--shadow-color);
            transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.2s;
            user-select: none;
        }
        .option-card .icon { font-size: 34px; }
        .option-card span:not(.icon) { font-size: 16px; }

        .option-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 var(--shadow-color);
        }
        .option-card input[type="checkbox"] { display: none; }

        /* Selected State */
        .option-card.selected {
            background-color: #fff0f2;
            border-color: var(--primary-pink);
            box-shadow: 0 4px 0 var(--primary-pink);
            transform: translateY(2px);
        }

        .custom-input-box {
            display: none;
            width: 100%;
            animation: popIn 0.3s ease;
        }

        /* Bottom Dual-Navigation Group (Back & Next) */
        .nav-group {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: auto;
            padding-top: 15px;
            min-height: 80px;
        }

        /* Jelly/Bouncy Cartoon Buttons */
        button, input[type="submit"] {
            font-family: 'Fredoka', sans-serif;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        .btn-yes, .btn-next, input[type="submit"] {
            background: var(--primary-pink);
            color: white;
            padding: 14px 40px;
            box-shadow: 0 6px 0 #e06d76;
        }
        .btn-yes:hover, .btn-next:hover, input[type="submit"]:hover {
            background: var(--hover-pink);
        }

        .btn-back, .btn-no {
            background: var(--btn-gray);
            color: var(--text-dark);
            padding: 14px 30px;
            box-shadow: 0 6px 0 var(--btn-gray-shadow);
        }
        .btn-back:hover { background: #d5d5d5; }

        /* Button Press Active Simulation */
        button:active, input[type="submit"]:active, .btn-yes:active {
            transform: translateY(4px) !important;
            box-shadow: 0 2px 0 cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        /* Step 1 Unique Layout for Absolute Dodge Button */
        .step1-btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            width: 100%;
            height: 90px;
            position: relative;
        }
        .btn-no {
            position: absolute;
            right: 20%;
            z-index: 99;
        }
        .btn-yes {
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="hearts-bg"></div>

    <div class="container">
        <form id="dateForm" action="https://api.web3forms.com/submit" method="POST" onsubmit="prepareSubmission()">

            <input type="hidden" name="access_key" value="03f4f2be-0c57-4ca6-a5bf-8faac5c09645">
            <input type="hidden" name="subject" value="New Romantic Date Response! ❤️">
            <input type="hidden" id="hidden-food" name="Selected_Food" value="">
            <input type="hidden" id="hidden-activities" name="Selected_Activities" value="">
            <input type="hidden" name="from_name" value="Romantic Date Planner">

            <div id="step-1" class="step-panel active">
                <div class="gif-container">
                    <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B0ZndvdnE1bW91b3R0NXN3MWhwMnN4Y295cHZ4bndpOHR6dHlsayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/9f2meEi1uzqdC0sia0/giphy.gif" alt="Bubu Dudu Cute">
                </div>
                <h1 id="question-text">Would you like to go on a date with me this weekend? 👉👈</h1>
                <div class="step1-btn-container" id="btn-container">
                    <button type="button" class="btn-yes" id="yesBtn" onclick="nextStep(1, 2)">Yes!</button>
                    <button type="button" class="btn-no" id="noBtn" onmouseover="dodge()" onclick="dodge()">No</button>
                </div>
            </div>

            <div id="step-2" class="step-panel">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTZ6YW10YmdwZ3A1M3RndXNnaW9wN3dwNDB3M3N0NDZndXNoeTdsMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/L40aR3S8xscwO7wB80/giphy.gif">
                </div>
                <h1>Pick a Date 📅</h1>
                <p>Which day works best for you?</p>
                <input type="date" name="Date" required disabled>
                <div class="nav-group">
                    <button type="button" class="btn-back" onclick="prevStep(2, 1)">Back</button>
                    <button type="button" class="btn-next" onclick="nextStep(2, 3)">Next ➡️</button>
                </div>
            </div>

            <div id="step-3" class="step-panel">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHc3MDRwbDJ3YWNhbmlmMnBrbTBpMWY1NzN4eXBocWZ0NXFkaDZ6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3orif4rfMvOAd5G8S4/giphy.gif">
                </div>
                <h1>Pick a Time ⏰</h1>
                <p>Scroll to choose the perfect time:</p>
                <input type="time" name="Time" required disabled>
                <div class="nav-group">
                    <button type="button" class="btn-back" onclick="prevStep(3, 2)">Back</button>
                    <button type="button" class="btn-next" onclick="nextStep(3, 4)">Next ➡️</button>
                </div>
            </div>

            <div id="step-4" class="step-panel">
                <h1>What shall we eat? 🍔</h1>
                <p>Select your favorites (Multiple Choices):</p>
                <div class="grid-options">
                    <label class="option-card" onclick="toggleCard(this)">
                        <input type="checkbox" data-group="food" value="Burgers">
                        <span class="icon">🍔</span><span>Burgers</span>
                    </label>
                    <label class="option-card" onclick="toggleCard(this)">
                        <input type="checkbox" data-group="food" value="Chinese Food">
                        <span class="icon">🥢</span><span>Chinese</span>
                    </label>
                    <label class="option-card" onclick="toggleCard(this)">
                        <input type="checkbox" data-group="food" value="Dessert">
                        <span class="icon">🍰</span><span>Dessert</span>
                    </label>
                    <label class="option-card" onclick="toggleCard(this)">
                        <input type="checkbox" data-group="food" value="Pizza">
                        <span class="icon">🍕</span><span>Pizza</span>
                    </label>
                    <label class="option-card" onclick="toggleCard(this)">
                        <input type="checkbox" data-group="food" value="Sushi">
                        <span class="icon">🍣</span><span>Sushi</span>
                    </label>
                    <label class="option-card" onclick="toggleCard(this); toggleCustomInput('food-custom', this)">
                        <input type="checkbox"
